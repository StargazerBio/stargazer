repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/HunterMcGushion/docstr_coverage
    rev: v2.3.2
    hooks:
      - id: docstr-coverage
        args: [--verbose, "0", --fail-under=100, src/]
  - repo: local
    hooks:
      - id: zensical-build
        name: zensical build (docs compile check)
        entry: uv run zensical build --clean
        language: system
        pass_filenames: false
        files: ^(docs/.*\.md|src/.*\.py|app/.*\.py|zensical\.toml|pyproject\.toml)$
      - id: mcp-server-import
        name: mcp server import check
        entry: uv run --extra mcp python -c "from stargazer.server import mcp"
        language: system
        pass_filenames: false
        files: ^(src/stargazer/(server|registry|marshal)\.py|src/stargazer/assets/.*\.py|pyproject\.toml)$
