[project]
site_name = "Stargazer"
site_description = "Bioinformatics pipeline framework built on Flyte v2"
docs_dir = "docs"
repo_url = "https://github.com/StargazerBio/stargazer"
repo_name = "StargazerBio/stargazer"
dev_addr = "0.0.0.0:8001"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = [
    { "Overview" = "architecture/overview.md" },
    { "Types & Assets" = "architecture/types.md" },
    { "Tasks" = "architecture/tasks.md" },
    { "Workflows" = "architecture/workflows.md" },
    { "MCP Server" = "architecture/mcp-server.md" },
    { "Configuration" = "architecture/configuration.md" },
    { "CLI" = "architecture/cli.md" },
  ]},
  { "Guides" = [
    { "Writing a Task" = "guides/writing-a-task.md" },
    { "Writing a Workflow" = "guides/writing-a-workflow.md" },
    { "Using the MCP Server" = "guides/mcp-server.md" },
    { "Contributing" = "guides/contributing.md" },
  ]},
  { "Reference" = [
    { "Catalog" = "reference/catalog.md" },
    { "API" = "reference/api.md" },
  ]},
]

[project.theme]
logo = "assets/8-bit_stargazer_no-bg.png"
favicon = "assets/8-bit_stargazer_no-bg_32x32.png"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.plugins]]
mkdocstrings = {enabled = true, handlers = {python = {paths = ["src"]}}}
