site_name: Stargazer
site_description: Bioinformatics pipeline framework built on Flyte v2

theme:
  name: material
  logo: assets/logo.jpg
  favicon: assets/logo.jpg
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - Overview: architecture/overview.md
      - Types & Assets: architecture/types.md
      - Tasks: architecture/tasks.md
      - Workflows: architecture/workflows.md
      - MCP Server: architecture/mcp-server.md
      - Modes: architecture/modes.md
      - CLI: architecture/cli.md
  - Guides:
      - Writing a Task: guides/writing-a-task.md
      - Writing a Workflow: guides/writing-a-workflow.md
      - Using the MCP Server: guides/mcp-server.md
  - API Reference: reference/api.md

exclude_docs: |
  _partials/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_catalog.py
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
