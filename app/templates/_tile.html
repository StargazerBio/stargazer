<div class="tile">
    {% if tile.section == 'workspace' %}
    <button type="button" class="tile-delete" data-delete-slug="{{ tile.slug }}"
            aria-label="Delete this notebook from your fork"
            title="Delete this notebook from your fork">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/>
            <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
        </svg>
    </button>
    {% endif %}
    <span class="tile-file">{{ tile.slug }}.py</span>
    <h3>{{ tile.title }}</h3>
    <p>{{ tile.description }}</p>
    <div class="tile-actions">
        <div class="launch-row">
            <form method="post" action="/launch" class="launch-form">
                <input type="hidden" name="slug" value="{{ tile.slug }}">
                <input type="hidden" name="section" value="{{ tile.section }}">
                <input type="hidden" name="mode" value="edit">
                <button class="btn btn-notebook" type="submit">Edit</button>
            </form>
        </div>
        <div class="launch-row">
            <form method="post" action="/launch" class="launch-form">
                <input type="hidden" name="slug" value="{{ tile.slug }}">
                <input type="hidden" name="section" value="{{ tile.section }}">
                <input type="hidden" name="mode" value="run">
                <button class="btn btn-github" type="submit">Run</button>
            </form>
        </div>
    </div>
</div>
