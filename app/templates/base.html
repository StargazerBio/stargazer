<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$title — Stargazer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #f0f6fc; margin-bottom: 0.5rem; font-size: 1.6rem; }
        p { margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-github { background: #238636; color: #fff; }
        .btn-notebook { background: #1f6feb; color: #fff; }
        .user-info {
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #8b949e;
        }
        .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .logout { color: #8b949e; font-size: 0.8rem; margin-top: 1rem; }
        .logout a { color: #8b949e; }
        .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        $body
    </div>
</body>
</html>
